<title>高配当株アラート確認</title>
<script>
(function(){
  const HASH = "3271fe0fec7477441b6472c959e07516a7925f29ff2aa6378df36d3f62f769ab";
  async function sha256(msg){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function check(){
    const stored = sessionStorage.getItem("kaby_auth");
    if(stored === HASH) return;
    let pass = prompt("パスワードを入力してください");
    if(pass === null){ document.body.innerHTML=""; return; }
    const h = await sha256(pass.trim());
    if(h !== HASH){
      alert("パスワードが違います");
      document.body.innerHTML="<div style='text-align:center;padding:60px;font-family:sans-serif;color:#666'>パスワードが違います。再度開いてください。</div>";
      return;
    }
    sessionStorage.setItem("kaby_auth", HASH);
  }
  document.addEventListener("DOMContentLoaded", check);
})();
</script>

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function fmt(n) {
  return Math.round(n).toLocaleString('ja-JP');
}

function calcShares(price, amount) {
  return Math.max(1, Math.round(amount / price));
}

function render() {
  const targetYield = parseFloat(document.getElementById('yieldInput').value) / 100 || 0.045;
  const purchaseAmt  = parseFloat(document.getElementById('amountInput').value) * 10000 || 50000;
  const q = document.getElementById('searchInput').value.toLowerCase();

  let stocks = STOCKS.filter(s => {
    const matchSearch = !q || s.code.includes(q) || s.name.toLowerCase().includes(q) ||
                        s.sector.toLowerCase().includes(q);
    if (!matchSearch) return false;
    switch (currentFilter) {
      case 'portfolio':   return s.inPortfolio;
      case 'sbi_only':    return !s.inPortfolio;
      case 'unpurchased': return s.status === 'unpurchased';
      case 'purchased':   return s.status === 'purchased' && !s.removed;
      case 'removed':     return s.removed;
      default:            return true;
    }
  });

  const sortVal = document.getElementById('sortSelect').value;
  if (sortVal !== 'default') {
    stocks.sort((a, b) => {
      switch (sortVal) {
        case 'code': return a.code.localeCompare(b.code);
        case 'name': return a.name.localeCompare(b.name, 'ja');
        case 'sector': return a.sector.localeCompare(b.sector, 'ja');
        case 'yield_desc': {
          const yA = a.cost ? a.annualDiv / a.cost : (a.pdfYield || 0);
          const yB = b.cost ? b.annualDiv / b.cost : (b.pdfYield || 0);
          return yB - yA;
        }
        case 'target_asc': {
          const tpA = a.status === 'unpurchased' ? a.annualDiv / a.pdfYield : a.annualDiv / targetYield;
          const tpB = b.status === 'unpurchased' ? b.annualDiv / b.pdfYield : b.annualDiv / targetYield;
          return tpA - tpB;
        }
        case 'cost_asc': {
          const cA = a.cost || Infinity;
          const cB = b.cost || Infinity;
          return cA - cB;
        }
      }
      return 0;
    });
  }

  const cards = document.getElementById('cards');
  if (stocks.length === 0) {
    cards.innerHTML = '<div class="empty"><div class="ico">🔍</div>該当する銘柄がありません</div>';
    return;
  }

  cards.innerHTML = stocks.map(s => {
    // 未購入はPDF利回り基準、購入済は目標利回り基準
    const targetPrice = s.status === 'unpurchased'
      ? Math.round(s.annualDiv / s.pdfYield)
      : Math.round(s.annualDiv / targetYield);
    const isPurchased = s.status === 'purchased';

    // badge
    let badgeHtml = '';
    if (s.removed) badgeHtml += '<span class="badge b-removed">除外済</span>';
    else if (s.isNew) badgeHtml += '<span class="badge b-new">★新規</span>';
    else if (isPurchased) badgeHtml += '<span class="badge b-purchased">購入済</span>';
    else badgeHtml += '<span class="badge b-unpurchased">未購入</span>';

    // portfolio badge
    const pfBadge = s.inPortfolio
      ? '<span class="badge" style="background:#EDE7F6;color:#4527A0">PF</span>'
      : '<span class="badge" style="background:#F3F3F3;color:#777">SBI</span>';

    const noteHtml = s.note
      ? `<div class="note">⚠︎ ${s.note}</div>` : '';

    // 購入予算：PF銘柄はPDF投資額×5、SBI銘柄はグローバル設定
    const budget = s.investAmount != null ? s.investAmount * 5 : purchaseAmt;
    const budgetLabel = s.investAmount != null
      ? `購入予算 ¥${fmt(budget)}（PDF ${fmt(s.investAmount)}×5）`
      : `購入予算 ¥${fmt(budget)}`;

    // holdings bar (for purchased)
    const holdingsHtml = isPurchased && s.shares
      ? `<div class="holdings-bar">
           <span>📦 現在 <strong>${s.shares}株</strong> 保有</span>
           <span>取得単価 ¥${fmt(s.cost)}</span>
           <span>目標株価 ¥${fmt(targetPrice)}</span>
           <span>${budgetLabel}</span>
         </div>`
      : (!isPurchased
          ? `<div class="holdings-bar" style="background:rgba(255,149,0,.06);color:#c45e00">
               📌 未購入 ｜ 目標株価 ¥${fmt(targetPrice)} ｜ 年間配当 ¥${s.annualDiv} ｜ ${budgetLabel}
             </div>`
          : '');

    let alertHtml = '';
    if (isPurchased) {
      const p1 = Math.round(s.cost * 0.8);
      const p2 = Math.round(targetPrice);
      const sh1 = calcShares(p1, budget);
      const sh2 = calcShares(p2, budget);
      alertHtml = `
        <div class="alerts two">
          <div class="alert-cell">
            <div class="a-label">追加購入① 取得-20%</div>
            <div class="a-price">¥${fmt(p1)}</div>
            <div class="a-shares">
              <span class="qty">${sh1}株</span>
              <span class="total"> 約¥${fmt(sh1*p1)}</span>
            </div>
          </div>
          <div class="alert-cell">
            <div class="a-label">追加購入② 目標価格</div>
            <div class="a-price">¥${fmt(p2)}</div>
            <div class="a-shares">
              <span class="qty">${sh2}株</span>
              <span class="total"> 約¥${fmt(sh2*p2)}</span>
            </div>
          </div>
        </div>`;
    } else {
      const sh = calcShares(targetPrice, budget);
      alertHtml = `
        <div class="alerts one">
          <div class="alert-cell">
            <div class="a-label">初回購入目標価格</div>
            <div class="a-price">¥${fmt(targetPrice)}</div>
            <div class="a-shares">
              <span class="qty">${sh}株</span>
              <span class="total"> 約¥${fmt(sh*targetPrice)}</span>
            </div>
          </div>
        </div>`;
    }

    return `
      <div class="card">
        <div class="card-head">
          <div class="card-left">
            <div class="code">${s.code}</div>
            <div class="name">${s.name}</div>
            <div class="meta">${s.sector} ｜ 年間配当 ¥${s.annualDiv}</div>
            ${noteHtml}
          </div>
          <div class="card-right">
            ${badgeHtml}
            ${pfBadge}
          </div>
        </div>
        ${holdingsHtml}
        <div class="divider"></div>
        ${alertHtml}
      </div>`;
  }).join('');
}

// 初期表示
render();
</script>
