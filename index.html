<title>高配当株アラート確認</title>
<script>
(function(){
  const HASH = "3271fe0fec7477441b6472c959e07516a7925f29ff2aa6378df36d3f62f769ab";
  async function sha256(msg){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function check(){
    const stored = sessionStorage.getItem("kaby_auth");
    if(stored === HASH) return;
    let pass = prompt("パスワードを入力してください");
    if(pass === null){ document.body.innerHTML=""; return; }
    const h = await sha256(pass.trim());
    if(h !== HASH){
      alert("パスワードが違います");
      document.body.innerHTML="<div style='text-align:center;padding:60px;font-family:sans-serif;color:#666'>パスワードが違います。再度開いてください。</div>";
      return;
    }
    sessionStorage.setItem("kaby_auth", HASH);
  }
  document.addEventListener("DOMContentLoaded", check);
})();
</script>

// ── LocalStorage キー ───────────────────────────────────────────
const LS_SBI      = 'kaby_sbi';       // {code: {shares,cost,current}}
const LS_SBI_DATE = 'kaby_sbi_date';  // "4/13" など
const LS_REMOVED  = 'kaby_removed';   // [code, ...]  ユーザーが除外
const LS_RESTORED = 'kaby_restored';  // [code, ...]  ユーザーが復活
const LS_USER     = 'kaby_user';      // [{...stockFields}]  ユーザー追加

function getSBI()        { return JSON.parse(localStorage.getItem(LS_SBI)      || '{}'); }
function getRemoved()    { return JSON.parse(localStorage.getItem(LS_REMOVED)  || '[]'); }
function getRestored()   { return JSON.parse(localStorage.getItem(LS_RESTORED) || '[]'); }
function getUserStocks() { return JSON.parse(localStorage.getItem(LS_USER)     || '[]'); }

// ── データマージ ─────────────────────────────────────────────────
function getStocks() {
  const sbi      = getSBI();
  const removed  = getRemoved();
  const restored = getRestored();
  const userList = getUserStocks();

  // ベースデータをディープコピー
  let stocks = BASE_STOCKS.map(s => ({...s}));

  // SBIデータで取得単価・株数・現在値を上書き
  stocks.forEach(s => {
    if (sbi[s.code]) {
      s.shares  = sbi[s.code].shares;
      s.cost    = sbi[s.code].cost;
      s.current = sbi[s.code].current;
      if (s.status === 'unpurchased' && s.shares > 0) s.status = 'purchased';
    }
  });

  // 除外/復活オーバーライド
  stocks.forEach(s => {
    if (removed.includes(s.code))  s.removed = true;
    if (restored.includes(s.code)) s.removed = false;
  });

  // ユーザー追加銘柄（重複スキップ）
  const existCodes = new Set(stocks.map(s => s.code));
  userList.forEach(u => {
    if (existCodes.has(u.code)) return;
    const us = {...u};
    if (sbi[us.code]) {
      us.shares  = sbi[us.code].shares;
      us.cost    = sbi[us.code].cost;
      us.current = sbi[us.code].current;
      if (us.status === 'unpurchased' && us.shares > 0) us.status = 'purchased';
    }
    if (removed.includes(us.code))  us.removed = true;
    if (restored.includes(us.code)) us.removed = false;
    stocks.push(us);
  });

  return stocks;
}

// ── CSV インポート ────────────────────────────────────────────────
function onCSVSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const text = new TextDecoder('shift-jis').decode(ev.target.result);
    const sbi = parseCSV(text);
    const count = Object.keys(sbi).length;
    if (count === 0) {
      alert('銘柄データが見つかりませんでした。\nSBI証券の保有銘柄一覧CSVを選択してください。');
      return;
    }
    localStorage.setItem(LS_SBI, JSON.stringify(sbi));
    const d = new Date();
    localStorage.setItem(LS_SBI_DATE, `${d.getMonth()+1}/${d.getDate()}`);
    render();
    alert(`SBIデータを読み込みました（${count}銘柄）`);
  };
  reader.readAsArrayBuffer(file);
}

function parseCSV(text) {
  const result = {};
  for (const line of text.replace(/\r/g,'').split('\n')) {
    // カンマ区切り・ダブルクォート除去
    const cols = line.split(',').map(s => s.replace(/^"|"$/g, '').trim());
    // 先頭が4桁数字の行のみ処理
    if (!/^\d{4}$/.test(cols[0])) continue;
    const shares  = parseFloat(cols[2]);
    const cost    = parseFloat(cols[4]);
    const current = parseFloat(cols[5]);
    if (shares > 0 && cost > 0) {
      result[cols[0]] = { shares, cost, current: isNaN(current) ? cost : current };
    }
  }
  return result;
}

// ── 銘柄追加モーダル ──────────────────────────────────────────────
function openAddModal() {
  document.getElementById('addOverlay').classList.remove('hidden');
  document.getElementById('m_code').focus();
}
function closeAddModal() {
  document.getElementById('addOverlay').classList.add('hidden');
  ['m_code','m_name','m_div','m_note'].forEach(id => document.getElementById(id).value = '');
}
function confirmAdd() {
  const code   = document.getElementById('m_code').value.trim();
  const name   = document.getElementById('m_name').value.trim();
  const sector = document.getElementById('m_sector').value;
  const div    = parseFloat(document.getElementById('m_div').value);
  const note   = document.getElementById('m_note').value.trim();

  if (!/^\d{4}$/.test(code)) { alert('銘柄コードは4桁の数字で入力してください'); return; }
  if (!name)                    { alert('銘柄名を入力してください'); return; }
  if (isNaN(div) || div <= 0)  { alert('年間配当を正しく入力してください'); return; }

  // 重複チェック
  if (getStocks().some(s => s.code === code)) {
    alert(`コード ${code} はすでに登録されています`);
    return;
  }

  const newStock = {
    code, name, sector,
    inPortfolio: false,
    status: 'unpurchased',
    annualDiv: div,
    cost: null, shares: null, current: null,
    note: note || '',
    removed: false,
    isNew: true,
    pdfYield: null,
    investAmount: null,
    userAdded: true,
  };

  const userList = getUserStocks();
  userList.push(newStock);
  localStorage.setItem(LS_USER, JSON.stringify(userList));
  closeAddModal();
  render();
}

// ── 除外 / 復活 / ユーザー銘柄削除 ──────────────────────────────
function removeStock(code) {
  if (!confirm(`${code} を除外済にしますか？`)) return;
  const rm = getRemoved();
  if (!rm.includes(code)) { rm.push(code); localStorage.setItem(LS_REMOVED, JSON.stringify(rm)); }
  const rv = getRestored().filter(c => c !== code);
  localStorage.setItem(LS_RESTORED, JSON.stringify(rv));
  render();
}
function restoreStock(code) {
  if (!confirm(`${code} の除外を解除しますか？`)) return;
  const rv = getRestored();
  if (!rv.includes(code)) { rv.push(code); localStorage.setItem(LS_RESTORED, JSON.stringify(rv)); }
  const rm = getRemoved().filter(c => c !== code);
  localStorage.setItem(LS_REMOVED, JSON.stringify(rm));
  render();
}
function deleteUserStock(code) {
  if (!confirm(`${code} を削除しますか？`)) return;
  const list = getUserStocks().filter(u => u.code !== code);
  localStorage.setItem(LS_USER, JSON.stringify(list));
  render();
}

let currentFilter = 'all';
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
function calcShares(price, amount) { return Math.max(1, Math.round(amount / price)); }

// ── メインレンダリング ────────────────────────────────────────────
function render() {
  const targetYield = parseFloat(document.getElementById('yieldInput').value) / 100 || 0.045;
  const purchaseAmt  = parseFloat(document.getElementById('amountInput').value) * 10000 || 50000;
  const q = document.getElementById('searchInput').value.toLowerCase();

  const allStocks = getStocks();
  const userCodes = new Set(getUserStocks().map(u => u.code));

  // サブタイトル更新
  const sbiDate   = localStorage.getItem(LS_SBI_DATE) || '';
  const userCount = getUserStocks().length;
  let sub = `全${allStocks.length}銘柄`;
  if (sbiDate)    sub += ` ｜ SBI: ${sbiDate}読込済`;
  if (userCount)  sub += ` ｜ 追加: ${userCount}銘柄`;
  document.getElementById('subtitle').textContent = sub;

  let stocks = allStocks.filter(s => {
    const matchSearch = !q || s.code.includes(q) || s.name.toLowerCase().includes(q) ||
                        s.sector.toLowerCase().includes(q);
    if (!matchSearch) return false;
    switch (currentFilter) {
      case 'portfolio':   return s.inPortfolio;
      case 'sbi_only':    return !s.inPortfolio && !s.userAdded;
      case 'unpurchased': return s.status === 'unpurchased';
      case 'purchased':   return s.status === 'purchased' && !s.removed;
      case 'removed':     return s.removed;
      default:            return true;
    }
  });

  const sortVal = document.getElementById('sortSelect').value;
  if (sortVal !== 'default') {
    stocks.sort((a, b) => {
      switch (sortVal) {
        case 'code': return a.code.localeCompare(b.code);
        case 'name': return a.name.localeCompare(b.name, 'ja');
        case 'sector': return a.sector.localeCompare(b.sector, 'ja');
        case 'yield_desc': {
          const yA = a.cost ? a.annualDiv / a.cost : (a.pdfYield || 0);
          const yB = b.cost ? b.annualDiv / b.cost : (b.pdfYield || 0);
          return yB - yA;
        }
        case 'target_asc': {
          const tpA = (a.status==='unpurchased' && a.pdfYield) ? a.annualDiv/a.pdfYield : a.annualDiv/targetYield;
          const tpB = (b.status==='unpurchased' && b.pdfYield) ? b.annualDiv/b.pdfYield : b.annualDiv/targetYield;
          return tpA - tpB;
        }
        case 'cost_asc': {
          return (a.cost || Infinity) - (b.cost || Infinity);
        }
      }
      return 0;
    });
  }

  const cards = document.getElementById('cards');
  if (stocks.length === 0) {
    cards.innerHTML = '<div class="empty"><div class="ico">🔍</div>該当する銘柄がありません</div>';
    return;
  }

  cards.innerHTML = stocks.map(s => {
    // 目標株価（未購入はPDF利回り or 目標利回りで計算）
    const targetPrice = (s.status === 'unpurchased' && s.pdfYield)
      ? Math.round(s.annualDiv / s.pdfYield)
      : Math.round(s.annualDiv / targetYield);
    const isPurchased = s.status === 'purchased';

    // ステータスバッジ
    let badgeHtml = '';
    if (s.removed)       badgeHtml += '<span class="badge b-removed">除外済</span>';
    else if (s.userAdded) badgeHtml += '<span class="badge b-user">手動追加</span>';
    else if (s.isNew)    badgeHtml += '<span class="badge b-new">★新規</span>';
    else if (isPurchased) badgeHtml += '<span class="badge b-purchased">購入済</span>';
    else                 badgeHtml += '<span class="badge b-unpurchased">未購入</span>';

    // PF/SBIバッジ
    const pfBadge = s.inPortfolio
      ? '<span class="badge" style="background:#EDE7F6;color:#4527A0">PF</span>'
      : '<span class="badge" style="background:#F3F3F3;color:#777">SBI</span>';

    const noteHtml = s.note ? `<div class="note">⚠︎ ${s.note}</div>` : '';

    // 購入予算
    const budget = s.investAmount != null ? s.investAmount * 5 : purchaseAmt;
    const budgetLabel = s.investAmount != null
      ? `購入予算 ¥${fmt(budget)}（PDF ${fmt(s.investAmount)}×5）`
      : `購入予算 ¥${fmt(budget)}`;

    // 保有情報バー
    const holdingsHtml = isPurchased && s.shares
      ? `<div class="holdings-bar">
           <span>📦 現在 <strong>${s.shares}株</strong> 保有</span>
           <span>取得単価 ¥${fmt(s.cost)}</span>
           <span>目標株価 ¥${fmt(targetPrice)}</span>
           <span>${budgetLabel}</span>
         </div>`
      : (!isPurchased
          ? `<div class="holdings-bar" style="background:rgba(255,149,0,.06);color:#c45e00">
               📌 未購入 ｜ 目標株価 ¥${fmt(targetPrice)} ｜ 年間配当 ¥${s.annualDiv} ｜ ${budgetLabel}
             </div>`
          : '');

    // アラートセル
    let alertHtml = '';
    if (isPurchased) {
      const p1 = Math.round(s.cost * 0.8);
      const p2 = Math.round(targetPrice);
      const sh1 = calcShares(p1, budget);
      const sh2 = calcShares(p2, budget);
      alertHtml = `
        <div class="alerts two">
          <div class="alert-cell">
            <div class="a-label">追加購入① 取得-20%</div>
            <div class="a-price">¥${fmt(p1)}</div>
            <div class="a-shares">
              <span class="qty">${sh1}株</span>
              <span class="total"> 約¥${fmt(sh1*p1)}</span>
            </div>
          </div>
          <div class="alert-cell">
            <div class="a-label">追加購入② 目標価格</div>
            <div class="a-price">¥${fmt(p2)}</div>
            <div class="a-shares">
              <span class="qty">${sh2}株</span>
              <span class="total"> 約¥${fmt(sh2*p2)}</span>
            </div>
          </div>
        </div>`;
    } else {
      const sh = calcShares(targetPrice, budget);
      alertHtml = `
        <div class="alerts one">
          <div class="alert-cell">
            <div class="a-label">初回購入目標価格</div>
            <div class="a-price">¥${fmt(targetPrice)}</div>
            <div class="a-shares">
              <span class="qty">${sh}株</span>
              <span class="total"> 約¥${fmt(sh*targetPrice)}</span>
            </div>
          </div>
        </div>`;
    }

    // アクションボタン
    let actionHtml;
    if (userCodes.has(s.code)) {
      actionHtml = `<div class="card-actions">
        <button class="btn-del" onclick="deleteUserStock('${s.code}')">削除</button>
      </div>`;
    } else if (s.removed) {
      actionHtml = `<div class="card-actions">
        <button class="btn-rv" onclick="restoreStock('${s.code}')">除外解除</button>
      </div>`;
    } else {
      actionHtml = `<div class="card-actions">
        <button class="btn-rm" onclick="removeStock('${s.code}')">除外</button>
      </div>`;
    }

    return `
      <div class="card">
        <div class="card-head">
          <div class="card-left">
            <div class="code">${s.code}</div>
            <div class="name">${s.name}</div>
            <div class="meta">${s.sector} ｜ 年間配当 ¥${s.annualDiv}</div>
            ${noteHtml}
          </div>
          <div class="card-right">
            ${badgeHtml}
            ${pfBadge}
          </div>
        </div>
        ${holdingsHtml}
        <div class="divider"></div>
        ${alertHtml}
        ${actionHtml}
      </div>`;
  }).join('');
}

// 初期表示
render();
</script>
</body>
</html>
